<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buzzing Focus</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- Typography: Lora for editorial English headings -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..740;1,400..740&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- ============================================================
    TOPBAR — brand, category tabs, actions
    ============================================================ -->
    <header class="topbar" id="topbar">
      <div class="topbar-body">
        <div class="brand">
          <svg class="mark" width="26" height="26" viewBox="0 0 32 32" aria-hidden="true">
            <rect width="32" height="32" rx="9" fill="#f0652f"/>
            <circle cx="16" cy="16" r="8" fill="none" stroke="#fff" stroke-width="2.2"/>
            <circle cx="16" cy="16" r="2.6" fill="#fff"/>
          </svg>
          <h1>Buzzing Focus</h1>
        </div>

        <nav id="categoryTabs" class="category-tabs" aria-label="新闻类别"></nav>

        <div class="actions" role="group" aria-label="工具栏">
          <button
            id="summaryButton"
            class="icon-button summary-button"
            type="button"
            aria-label="AI 总结"
            title="AI 总结今日要闻"
          >
            <span aria-hidden="true">✨</span>
          </button>
          <button
            id="themeButton"
            class="icon-button"
            type="button"
            aria-label="切换夜间模式"
            title="切换夜间模式"
          >
            <span aria-hidden="true">☾</span>
          </button>
        </div>
      </div>
    </header>

    <!-- ============================================================
    MAIN — error notice + multi-column feed board
    ============================================================ -->
    <main class="shell">
      <section id="errorBox" class="notice" hidden></section>
      <section id="feed" class="feed" aria-live="polite"></section>
    </main>

    <!-- ============================================================
    TEMPLATE — article card (cloned by JS renderer)
    ============================================================ -->
    <template id="articleTemplate">
      <article class="story">
        <a class="media" target="_blank" rel="noreferrer">
          <img alt="" loading="lazy" />
        </a>
        <div class="story-body">
          <a class="title" target="_blank" rel="noreferrer"></a>
          <p class="summary"></p>
          <div class="links">
            <time class="card-time"></time>
            <button class="expand-toggle" type="button">展开</button>
            <a class="discussion" target="_blank" rel="noreferrer">讨论</a>
          </div>
        </div>
      </article>
    </template>

    <!-- Application entry point (ES module) -->
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
